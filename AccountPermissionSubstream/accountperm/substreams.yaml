specVersion: v0.1.0
package:
  name: accountperm
  version: v0.1.0
  url: https://github.com/username/accountperm-tron
  description: Substreams module for accountperm on TRON Mainnet

imports:
  tron: https://spkg.io/v1/packages/tron_foundational/v0.1.2

protobuf:
  files:
    - proto/lines.proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ./target/wasm32-unknown-unknown/release/substreams.wasm

modules:
  - name: map_my_filtered_transactions
    use: tron:filtered_transactions

  - name: map_my_data
    kind: map
    initialBlock: 7871320
    inputs:
      - map: map_my_filtered_transactions
    output:
      type: proto:sf.substreams.sink.files.v1.Lines

network: tron

params:
  map_my_filtered_transactions: contract_type:AccountPermissionUpdateContract